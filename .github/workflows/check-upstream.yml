name: Check Upstream

on:
  schedule:
    # Check for new upstream releases at 9am and 9pm daily
    - cron: '0 9,21 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Check upstream release
        id: check
        env:
          UPSTREAM_REPO: advplyr/audiobookshelf
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching latest release from $UPSTREAM_REPO..."
          UPSTREAM_LATEST=$(gh release view --repo "$UPSTREAM_REPO" --json tagName --jq '.tagName' 2>&1)
          echo "Latest upstream: $UPSTREAM_LATEST"

          # Check if latest tag already points to this version
          LATEST_DIGEST=$(gh api "packages/container/${{ github.repository_owner }}%2Faudiobookshelf-fdk/tags/latest" \
            --jq '.digest' 2>/dev/null || echo "")
          CURRENT_DIGEST=$(gh api "packages/container/${{ github.repository_owner }}%2Faudiobookshelf-fdk/tags/$UPSTREAM_LATEST" \
            --jq '.digest' 2>/dev/null || echo "")

          if [ "$LATEST_DIGEST" = "$CURRENT_DIGEST" ] && [ -n "$LATEST_DIGEST" ]; then
            echo "Image 'latest' already matches upstream $UPSTREAM_LATEST, skipping build"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "New upstream release detected: $UPSTREAM_LATEST"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    uses: ./.github/workflows/build-publish.yml
    with:
      audiobookshelf_tag: latest
