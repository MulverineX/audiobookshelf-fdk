name: Build and Publish

on:
  workflow_dispatch:
    inputs:
      audiobookshelf_tag:
        description: 'Audiobookshelf version to build (e.g., 2.21.0, latest, edge)'
        required: true
        default: 'latest'
  workflow_call:
    inputs:
      audiobookshelf_tag:
        type: string
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/audiobookshelf-fdk

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.audiobookshelf_tag }}
            type=sha,prefix=

      - name: Build and push with provenance
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            AUDIOBOOKSHELF_TAG=${{ inputs.audiobookshelf_tag }}
          provenance: true
          sbom: true
