name: Build and Publish

on:
  workflow_dispatch:
    inputs:
      audiobookshelf_tag:
        description: 'Audiobookshelf version to build (e.g., 2.21.0, latest, edge)'
        required: true
        default: 'latest'
  workflow_call:
    inputs:
      audiobookshelf_tag:
        type: string
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/audiobookshelf-fdk

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      resolved_tag: ${{ steps.resolve.outputs.resolved_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: resolve
        env:
          INPUT_TAG: ${{ inputs.audiobookshelf_tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$INPUT_TAG" = "latest" ] || [ "$INPUT_TAG" = "edge" ]; then
            RESOLVED=$(gh release view --repo advplyr/audiobookshelf --json tagName --jq '.tagName')
          else
            RESOLVED="$INPUT_TAG"
          fi
          echo "Resolved tag: $RESOLVED"
          echo "resolved_tag=$RESOLVED" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.audiobookshelf_tag }}
            type=raw,value=${{ steps.resolve.outputs.resolved_tag }}
            type=sha,prefix=

      - name: Build and push with provenance
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            AUDIOBOOKSHELF_TAG=${{ steps.resolve.outputs.resolved_tag }}
          provenance: true
          sbom: true
